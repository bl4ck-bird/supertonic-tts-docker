name: build-and-push

# Pull requests validate (test + build + smoke, no push); pushes to main publish
# to GHCR. Each architecture builds on its own native runner in parallel
# (amd64 on ubuntu-latest, arm64 on ubuntu-24.04-arm — no QEMU), then a merge job
# assembles the multi-arch manifest. Doc-only changes are skipped via paths-ignore.
on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'THIRD_PARTY_LICENSES'
      - '.gitignore'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'THIRD_PARTY_LICENSES'
      - '.gitignore'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

# Cancel superseded PR runs; never cancel a main publish mid-flight.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write # cargo audit (rustsec/audit-check) posts a check run
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable # SHA pin can't derive the channel from the ref
          components: clippy, rustfmt

      # Style gate. helper.rs is opted out via #[rustfmt::skip] at its mod
      # declaration (vendored verbatim), matching its clippy::all suppression.
      - run: cargo fmt --check
      - run: cargo test --locked --bin supertonic
      # Gate on warnings: our code is clippy-clean and the vendored helper.rs is
      # suppressed at its `mod` declaration, so any new warning fails the build.
      - run: cargo clippy --locked --bin supertonic -- -D warnings

      # Report RustSec advisories. Non-blocking: the inference deps
      # (ort/rand/ndarray) are pinned to the upstream helper.rs API and cannot be
      # bumped on an advisory.
      - name: cargo audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # One job per architecture, on its native runner, in parallel. Builds and
  # smoke-tests both images; on push, also pushes each by digest for the merge job.
  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Image name is independent of the repo name: ghcr.io/<owner>/supertonic
      # (lowercased — GHCR requires lowercase). The package links back to this
      # repo via the org.opencontainers.image.source annotation set at merge.
      - name: Resolve image name
        run: echo "IMAGE=${REGISTRY,,}/${GITHUB_REPOSITORY_OWNER,,}/supertonic" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Build the runtime image for this runner's native arch and load it locally
      # so we can smoke-test before publishing. Per-arch cache scope keeps amd64
      # and arm64 caches from clobbering each other across runs.
      - name: Build minimal (load for smoke)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: minimal
          platforms: ${{ matrix.platform }}
          load: true
          tags: supertonic:smoke
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Smoke test (minimal)
        run: |
          docker run --rm supertonic:smoke --help
          docker run --rm supertonic:smoke synth --help
          # ort's load-dynamic dlopen's this at runtime; fail now if it is absent.
          docker run --rm --entrypoint sh supertonic:smoke -c 'test -e "$ORT_DYLIB_PATH"'

      # Reuses the cached build stage; only adds ffmpeg. Validates the ffmpeg
      # image assembles (and actually carries ffmpeg) on every PR.
      - name: Build ffmpeg (load for smoke)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: ffmpeg
          platforms: ${{ matrix.platform }}
          load: true
          tags: supertonic:smoke-ffmpeg
          cache-from: type=gha,scope=${{ matrix.arch }}

      - name: Smoke test (ffmpeg)
        run: docker run --rm --entrypoint sh supertonic:smoke-ffmpeg -c 'command -v ffmpeg >/dev/null'

      # --- publish (push by digest), only on a push to main ---
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push minimal by digest
        if: github.event_name == 'push'
        id: push_minimal
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: minimal
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}

      - name: Push ffmpeg by digest
        if: github.event_name == 'push'
        id: push_ffmpeg
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: ffmpeg
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}

      - name: Export digests
        if: github.event_name == 'push'
        run: |
          mkdir -p /tmp/digests/minimal /tmp/digests/ffmpeg
          echo "${{ steps.push_minimal.outputs.digest }}" > "/tmp/digests/minimal/${{ matrix.arch }}"
          echo "${{ steps.push_ffmpeg.outputs.digest }}" > "/tmp/digests/ffmpeg/${{ matrix.arch }}"

      - name: Upload digests
        if: github.event_name == 'push'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1
          if-no-files-found: error

  # Assemble the per-arch images (pushed by digest) into multi-arch manifests and
  # apply the human tags. Only runs on a push to main.
  merge:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Resolve image name
        run: echo "IMAGE=${REGISTRY,,}/${GITHUB_REPOSITORY_OWNER,,}/supertonic" >> "$GITHUB_ENV"

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # CalVer with a same-day MICRO counter: first build of the day is
      # :YYYY.MM.DD, the next :YYYY.MM.DD.2, etc. (probed against the registry).
      # minimal and ffmpeg share the date tag; ffmpeg adds a -ffmpeg suffix.
      - name: Compute date tag
        id: tags
        env:
          DOCKER_CLI_EXPERIMENTAL: enabled
        run: |
          date=$(date -u +%Y.%m.%d)
          tag="$date"; n=1
          while docker manifest inspect "${IMAGE}:${tag}" >/dev/null 2>&1; do
            n=$((n + 1)); tag="${date}.${n}"
          done
          echo "date=${tag}" >> "$GITHUB_OUTPUT"

      # Minimal image (wav/pcm) -> :latest + dated :YYYY.MM.DD[.N]
      - name: Create minimal manifest
        working-directory: /tmp/digests/minimal
        run: |
          docker buildx imagetools create \
            --annotation "index:org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --annotation "index:org.opencontainers.image.description=SuperTonic 3 OpenAI-compatible TTS server (wav/pcm)" \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${{ steps.tags.outputs.date }}" \
            $(for f in *; do printf '%s@%s ' "$IMAGE" "$(cat "$f")"; done)

      # ffmpeg image (+ compressed formats) -> :ffmpeg + dated :YYYY.MM.DD[.N]-ffmpeg
      - name: Create ffmpeg manifest
        working-directory: /tmp/digests/ffmpeg
        run: |
          docker buildx imagetools create \
            --annotation "index:org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --annotation "index:org.opencontainers.image.description=SuperTonic 3 OpenAI-compatible TTS server (+ffmpeg)" \
            -t "${IMAGE}:ffmpeg" \
            -t "${IMAGE}:${{ steps.tags.outputs.date }}-ffmpeg" \
            $(for f in *; do printf '%s@%s ' "$IMAGE" "$(cat "$f")"; done)

      - name: Inspect published manifests
        run: |
          docker buildx imagetools inspect "${IMAGE}:latest"
          docker buildx imagetools inspect "${IMAGE}:ffmpeg"
