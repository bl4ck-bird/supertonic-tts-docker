[package]
name = "supertonic-tts-server"
version = "0.1.0"
edition = "2021"
license = "MIT"

[[bin]]
name = "supertonic"
path = "src/main.rs"

[dependencies]
# --- inference deps required by the upstream helper.rs (supertonic v3.0.0) ---
# Upstream helper.rs targets rc.7; rc.12 is API-compatible and what resolves.
# load-dynamic: onnxruntime is NOT linked at build; it is dlopen'd at runtime
# from ORT_DYLIB_PATH. Keeps the binary ~5MB and lets us use Alpine's musl
# onnxruntime package. `ndarray` is required by helper.rs (Value::from_array /
# try_extract_tensor). `api-24` targets ONNX Runtime C API v24 (fwd-compatible
# with the newer runtime Alpine ships).
# Pinned to what upstream helper.rs is written against — do NOT bump blindly
# (e.g. rand 0.9 removes thread_rng, which helper.rs relies on).
ort = { version = "=2.0.0-rc.12", default-features = false, features = [
    "std",
    "ndarray",
    "tracing",
    "load-dynamic",
    "api-24",
] }
hound = "3.5"
ndarray = "0.17"
rand = "0.8"
rand_distr = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
unicode-normalization = "0.1"
regex = "1.10"

# --- web server ---
axum = "0.8"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = "0.3"
base64 = "0.22"
# OpenAPI generated from code annotations (ToSchema / utoipa::path).
utoipa = "5"
# CLI subcommands (synth/voices/import); the server is the default mode.
clap = { version = "4", features = ["derive"] }
# Request timeout + body-size-limit middleware for the router.
tower-http = { version = "0.6", features = ["timeout"] }
# HTTP client for the in-process model download and the `healthcheck` subcommand.
# Default features give rustls with the `ring` provider (not aws-lc-rs, which
# needs cmake on musl) and webpki-roots (CA bundle compiled in, so the runtime
# image needs no ca-certificates). Keep `ring` for the musl build.
ureq = "3"
# SHA-256 verification of downloaded LFS files against the HF tree API oid.
sha2 = "0.11"
# SHA-1 for git-blob-oid verification of non-LFS files (the tree API `oid`).
# Match sha2's 0.11 line so both share one `digest` version (no bloat/conflict).
sha1 = "0.11"

[profile.release]
opt-level = 3
strip = true
lto = true
