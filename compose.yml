# SuperTonic 3 TTS — minimal image (wav/pcm only).
#   docker compose up --build
# Serves on http://localhost:8080. Assets (~400MB: onnx + voice_styles) download
# once into the local `./assets` directory on first start, so they persist and
# are easy to inspect or back up.
#
# For compressed formats (mp3/opus/aac/flac/ogg), use compose-ffmpeg.yml.
services:
  supertonic:
    build:
      context: .
      dockerfile: Dockerfile
      target: minimal
    image: supertonic:latest
    # Run as your host user so the mounted ./assets dir (owned by you) stays
    # writable for the first-run download. Most reliable across shells:
    #   SUPERTONIC_UID=$(id -u) SUPERTONIC_GID=$(id -g) docker compose up
    # As a convenience it also honors an exported UID/GID; with none of these
    # set it falls back to root.
    user: "${SUPERTONIC_UID:-${UID:-0}}:${SUPERTONIC_GID:-${GID:-0}}"
    ports:
      - "${SUPERTONIC_PORT:-8080}:8080" # host port (container always listens on 8080)
    # All tunables are optional; defaults shown in comments. Override via your
    # shell env or a .env file beside this compose file.
    environment:
      SUPERTONIC_THREADS: ${SUPERTONIC_THREADS:-} # OMP_NUM_THREADS for onnxruntime
      SUPERTONIC_HF_REPO: ${SUPERTONIC_HF_REPO:-} # model repo (default Supertone/supertonic-3)
      SUPERTONIC_HF_REVISION: ${SUPERTONIC_HF_REVISION:-} # model revision (default: pinned commit)
      SUPERTONIC_MAX_TEXT_BYTES: ${SUPERTONIC_MAX_TEXT_BYTES:-} # per-utterance input cap (default 4096)
      SUPERTONIC_MAX_BATCH_TEXT_BYTES: ${SUPERTONIC_MAX_BATCH_TEXT_BYTES:-} # batch input cap (default 50000)
    volumes:
      - ./assets:/assets
    # OOM-kill a runaway synthesis instead of pressuring the host; the input caps
    # above bound peak memory (synthesized audio dwarfs the input text).
    mem_limit: ${SUPERTONIC_MEM_LIMIT:-2g} # default 2g
    restart: unless-stopped
